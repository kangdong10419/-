<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 게임</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --grid: #1f2937;
      --text: #e5e7eb;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrap {
      display: grid;
      grid-template-columns: auto 240px;
      gap: 20px;
      align-items: start;
      max-width: 900px;
      width: 100%;
    }

    .board-area {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    canvas {
      display: block;
      background: #0b1220;
      border-radius: 12px;
      border: 1px solid #243244;
    }

    .side {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .card {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      margin: 0 0 8px;
      color: #fff;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 15px;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #38bdf8, #0284c7);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
    }

    button.secondary {
      background: linear-gradient(180deg, #475569, #334155);
      box-shadow: none;
    }

    .help {
      font-size: 13px;
      line-height: 1.7;
      color: #cbd5e1;
      margin: 0;
    }

    .gameover {
      color: #fca5a5;
      font-weight: 700;
      display: none;
      margin-top: 10px;
    }

    .mobile-controls {
      display: none;
      margin-top: 12px;
      gap: 8px;
      grid-template-columns: repeat(3, 1fr);
    }

    .mobile-controls button {
      padding: 14px 10px;
      font-size: 18px;
    }

    @media (max-width: 820px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="board-area">
      <canvas id="game" width="300" height="600"></canvas>
    </div>

    <div class="side">
      <div class="card">
        <h1 class="title">테트리스</h1>
        <div class="stat"><span>점수</span><strong id="score">0</strong></div>
        <div class="stat"><span>레벨</span><strong id="level">1</strong></div>
        <div class="stat"><span>줄</span><strong id="lines">0</strong></div>
        <div id="gameover" class="gameover">게임 오버</div>
      </div>

      <div class="card">
        <div class="stat" style="margin-top:0;"><span>다음 블록</span></div>
        <canvas id="next" width="120" height="120"></canvas>
      </div>

      <div class="card">
        <p class="help">
          조작 방법<br>
          ← → : 이동<br>
          ↓ : 빠르게 내리기<br>
          ↑ : 회전<br>
          스페이스 : 즉시 떨어뜨리기<br>
          P : 일시정지
        </p>
      </div>

      <div class="buttons">
        <button id="restart">다시 시작</button>
        <button id="pause" class="secondary">일시정지</button>
      </div>

      <div class="mobile-controls">
        <button id="left">←</button>
        <button id="rotate">↻</button>
        <button id="right">→</button>
        <button id="down">↓</button>
        <button id="drop">⤓</button>
        <button id="pause2">P</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const nextCanvas = document.getElementById("next");
    const nextCtx = nextCanvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const linesEl = document.getElementById("lines");
    const gameoverEl = document.getElementById("gameover");
    const restartBtn = document.getElementById("restart");
    const pauseBtn = document.getElementById("pause");
    const pauseBtn2 = document.getElementById("pause2");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const COLORS = [
      null,
      "#00f0f0",
      "#0000f0",
      "#f0a000",
      "#f0f000",
      "#00f000",
      "#a000f0",
      "#f00000"
    ];

    const SHAPES = [
      [],
      [[1,1,1,1]],
      [[2,0,0],[2,2,2]],
      [[0,0,3],[3,3,3]],
      [[4,4],[4,4]],
      [[0,5,5],[5,5,0]],
      [[0,6,0],[6,6,6]],
      [[7,7,0],[0,7,7]]
    ];

    let board, current, nextPiece, score, lines, level, dropCounter, dropInterval, lastTime, paused, gameOver;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function createPiece() {
      const type = 1 + Math.floor(Math.random() * 7);
      return {
        type,
        shape: SHAPES[type].map(row => row.slice()),
        x: 0,
        y: 0
      };
    }

    function resetPiece(piece) {
      piece.shape = SHAPES[piece.type].map(row => row.slice());
      piece.x = Math.floor((COLS - piece.shape[0].length) / 2);
      piece.y = 0;
    }

    function drawCell(context, x, y, value, size) {
      if (!value) return;
      context.fillStyle = COLORS[value];
      context.fillRect(x * size, y * size, size, size);
      context.strokeStyle = "rgba(255,255,255,0.18)";
      context.lineWidth = 2;
      context.strokeRect(x * size + 1, y * size + 1, size - 2, size - 2);
    }

    function drawMatrix(context, matrix, offsetX, offsetY, size) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            context.fillStyle = COLORS[value];
            context.fillRect((x + offsetX) * size, (y + offsetY) * size, size, size);
            context.strokeStyle = "rgba(255,255,255,0.18)";
            context.lineWidth = 2;
            context.strokeRect((x + offsetX) * size + 1, (y + offsetY) * size + 1, size - 2, size - 2);
          }
        });
      });
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0b1220";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          ctx.strokeStyle = "#172036";
          ctx.lineWidth = 1;
          ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
          if (board[y][x]) drawCell(ctx, x, y, board[y][x], BLOCK);
        }
      }

      drawMatrix(ctx, current.shape, current.x, current.y, BLOCK);

      if (paused && !gameOver) {
        overlayText("일시정지");
      }
      if (gameOver) {
        overlayText("게임 오버");
      }
    }

    function overlayText(text) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 28px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.fillStyle = "#0b1220";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

      const shape = nextPiece.shape;
      const size = 24;
      const offsetX = Math.floor((4 - shape[0].length) / 2);
      const offsetY = Math.floor((4 - shape.length) / 2);

      shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            nextCtx.fillStyle = COLORS[value];
            nextCtx.fillRect((x + offsetX) * size, (y + offsetY) * size, size, size);
            nextCtx.strokeStyle = "rgba(255,255,255,0.18)";
            nextCtx.lineWidth = 2;
            nextCtx.strokeRect((x + offsetX) * size + 1, (y + offsetY) * size + 1, size - 2, size - 2);
          }
        });
      });
    }

    function collide(board, piece) {
      const { shape, x: px, y: py } = piece;
      for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
          if (!shape[y][x]) continue;
          const bx = px + x;
          const by = py + y;
          if (bx < 0 || bx >= COLS || by >= ROWS) return true;
          if (by >= 0 && board[by][bx]) return true;
        }
      }
      return false;
    }

    function merge(board, piece) {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            const by = piece.y + y;
            const bx = piece.x + x;
            if (by >= 0) board[by][bx] = value;
          }
        });
      });
    }

    function rotateMatrix(matrix) {
      const n = matrix.length;
      const m = matrix[0].length;
      const rotated = Array.from({ length: m }, () => Array(n).fill(0));
      for (let y = 0; y < n; y++) {
        for (let x = 0; x < m; x++) {
          rotated[x][n - 1 - y] = matrix[y][x];
        }
      }
      return rotated;
    }

    function rotatePiece() {
      const rotated = rotateMatrix(current.shape);
      const prev = current.shape;
      current.shape = rotated;
      let offset = 0;
      while (collide(board, current)) {
        current.x += offset;
        offset = offset > 0 ? -(offset + 1) : -(offset - 1);
        if (Math.abs(offset) > current.shape[0].length) {
          current.shape = prev;
          current.x = current.x;
          return;
        }
      }
    }

    function clearLines() {
      let cleared = 0;
      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (!board[y][x]) continue outer;
        }
        board.splice(y, 1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
        y++;
      }

      if (cleared > 0) {
        lines += cleared;
        score += [0, 100, 300, 500, 800][cleared] * level;
        level = 1 + Math.floor(lines / 10);
        dropInterval = Math.max(120, 800 - (level - 1) * 60);
        updateUI();
      }
    }

    function spawnPiece() {
      current = nextPiece;
      resetPiece(current);
      nextPiece = createPiece();
      drawNext();
      if (collide(board, current)) {
        gameOver = true;
        paused = false;
        gameoverEl.style.display = "block";
        pauseBtn.textContent = "일시정지";
      }
    }

    function lockPiece() {
      merge(board, current);
      clearLines();
      spawnPiece();
    }

    function hardDrop() {
      if (paused || gameOver) return;
      while (!collide(board, { ...current, y: current.y + 1 })) {
        current.y++;
        score += 1;
      }
      lockPiece();
      updateUI();
    }

    function move(dir) {
      if (paused || gameOver) return;
      current.x += dir;
      if (collide(board, current)) current.x -= dir;
    }

    function softDrop() {
      if (paused || gameOver) return;
      current.y++;
      if (collide(board, current)) {
        current.y--;
        lockPiece();
      } else {
        score += 1;
      }
      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = score;
      levelEl.textContent = level;
      linesEl.textContent = lines;
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      pauseBtn.textContent = paused ? "계속하기" : "일시정지";
    }

    function restart() {
      board = createBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 800;
      dropCounter = 0;
      lastTime = 0;
      paused = false;
      gameOver = false;
      gameoverEl.style.display = "none";
      pauseBtn.textContent = "일시정지";
      current = createPiece();
      resetPiece(current);
      nextPiece = createPiece();
      drawNext();
      updateUI();
      drawBoard();
      requestAnimationFrame(loop);
    }

    function update(time = 0) {
      if (gameOver || paused) return;
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;
      if (dropCounter > dropInterval) {
        softDrop();
        dropCounter = 0;
      }
    }

    function loop(time = 0) {
      if (!gameOver) {
        update(time);
        drawBoard();
        requestAnimationFrame(loop);
      } else {
        drawBoard();
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") move(-1);
      else if (e.key === "ArrowRight") move(1);
      else if (e.key === "ArrowDown") softDrop();
      else if (e.key === "ArrowUp") rotatePiece();
      else if (e.key === " ") hardDrop();
      else if (e.key.toLowerCase() === "p") togglePause();
      drawBoard();
    });

    restartBtn.addEventListener("click", restart);
    pauseBtn.addEventListener("click", togglePause);
    pauseBtn2.addEventListener("click", togglePause);

    document.getElementById("left").addEventListener("click", () => { move(-1); drawBoard(); });
    document.getElementById("right").addEventListener("click", () => { move(1); drawBoard(); });
    document.getElementById("down").addEventListener("click", () => { softDrop(); drawBoard(); });
    document.getElementById("rotate").addEventListener("click", () => { rotatePiece(); drawBoard(); });
    document.getElementById("drop").addEventListener("click", () => { hardDrop(); drawBoard(); });

    restart();
  </script>
</body>
</html>
